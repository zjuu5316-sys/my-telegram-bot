name: Run Telegram Bot

on:
  push:
    branches: [ main ]  # ကုဒ်အသစ်တင်တိုင်း Run မည်
  workflow_dispatch:     # GitHub တွင် Manual (ကိုယ်တိုင်နှိပ်ပြီး) Run ခွင့်ပြုမည်

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Bot
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}  # လျှို့ဝှက်ချက် Token ကို ဆွဲယူခြင်း
      run: python bot.py
      
